<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoredBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>
    <div class="mx-auto flex h-screen w-full max-w-md flex-col items-center justify-center gap-4">
        <div class="text-center">
            <p class="text-3xl">🤖</p>
            <h1 class="text-4xl font-medium text-black">BoredBot</h1>
        </div>

        <h4 class="text-xl font-normal text-gray-700">Find something to do 👇</h4>

        <button class="btn rounded-full w-24 h-24 btn-error shadow-md cursor-pointer" id="get-activity"></button>

        <div class="mt-6 text-center text-2xl italic text-gray-700" id="activity-name"></div>
    </div>
</body>

</html>
